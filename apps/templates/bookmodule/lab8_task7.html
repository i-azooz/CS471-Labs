<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 7</title>
</head>
<body>
    <h1>Task 7: Students in Cities Starting with "R"</h1>
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Age</th>
                <th>City (Address)</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
                {% if student.city|slice:":1" == "R" %}
                    <tr>
                        <td>{{ student.name }}</td>
                        <td>{{ student.age }}</td>
                        <td>{{ student.city }}</td>
                    </tr>
                {% endif %}
            {% empty %}
                <tr>
                    <td colspan="3">No students available.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
