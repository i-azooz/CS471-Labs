<!DOCTYPE html>
<html>
<head>
    <title>Lab 9 - Task 2</title>
</head>
<body>
    <h2>Publishers and Total Book Stock</h2>
    <table border="1">
        <tr>
            <th>Publisher Name</th>
            <th>Total Book Stock</th>
        </tr>
        {% for pub in publishers %}
        <tr>
            <td>{{ pub.name }}</td>
            <td>{{ pub.total_books_stock|default:0 }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
