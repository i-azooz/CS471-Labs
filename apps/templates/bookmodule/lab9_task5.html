<h2>Publishers & Highly Rated Books</h2>
<table border="1">
    <tr>
        <th>Publisher Name</th>
        <th>Number of High Rated Books (Rating >= 4)</th>
    </tr>
    {% for pub in publishers %}
    <tr>
        <td>{{ pub.name }}</td>
        <td>{{ pub.high_rated_count }}</td>
    </tr>
    {% endfor %}
</table>
