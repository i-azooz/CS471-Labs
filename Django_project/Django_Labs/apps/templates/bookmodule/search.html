<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="card shadow-sm p-4" style="max-width: 500px; margin: auto;">
        <h3 class="text-center mb-4 text-primary">Book Search Engine 📚</h3>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Keywords:</label>
                <input type="text" name="keyword" class="form-control" placeholder="Enter a keyword..." required>
            </div>
            
            <div class="mb-3">
                <label class="form-label d-block fw-bold">Search in:</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="option1" id="title" checked>
                    <label class="form-check-label" for="title">Title</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" name="option2" id="author">
                    <label class="form-check-label" for="author">Author</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                Search 🔍
            </button>
        </form>
    </div>
</div>
